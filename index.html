<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>MEK-MAN TEST</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #333; color: #fff; border: none; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>TESTLÄGE: KLIPPER SPELET VID 15?</h2>
        <button class="btn" onclick="initGame()" style="background: #00ff00; color: #000; font-weight: bold;">STARTA TESTET</button>
    </div>

    <div id="game-area" style="display:none; max-width: 400px; margin: 0 auto;">
        <h3 id="question-tracker" style="color: #ffff00;">Fråga X av Y</h3>
        <p id="question-text">Laddar fråga...</p>
        <div id="answer-buttons"></div>
    </div>

<script>
    // --- SKAPAR 20 STYCKEN DUMMY-FRÅGOR FÖR NIVÅ 1 AUTOMATISKT ---
    const allQuestions = [];
    for(let i = 1; i <= 20; i++) {
        allQuestions.push({ lvl: 1, q: "Detta är testfråga nummer " + i, r: "Klicka här (Rätt)", f: ["Fel", "Fel", "Fel"] });
    }

    const questionsPerLevel = [15, 15, 15, 15, 15]; 
    let currentLevel = 1;
    let currentQuestions = [];
    let questionIndex = 0;

    function initGame() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-area").style.display = "block";
        startLevel();
    }

    function startLevel() {
        let numQuestions = questionsPerLevel[currentLevel - 1] || 15;
        
        let levelQs = allQuestions.filter(q => q.lvl === currentLevel);
        levelQs = levelQs.sort(() => 0.5 - Math.random());
        
        // Här sker klippningen
        currentQuestions = levelQs.slice(0, numQuestions);
        
        questionIndex = 0;
        showQuestion();
    }

    function showQuestion() {
        let qData = currentQuestions[questionIndex];
        
        document.getElementById("question-tracker").innerText = `Fråga ${questionIndex + 1} av ${currentQuestions.length}`;
        document.getElementById("question-text").innerText = qData.q;
        
        let options = [qData.r, ...qData.f]; // Blanda inte svarsalternativen i testet
        let btnHTML = "";
        
        options.forEach(opt => {
            let isCorrect = (opt === qData.r);
            btnHTML += `<button class="btn" onclick="checkAnswer(this)">${opt}</button>`;
        });
        
        document.getElementById("answer-buttons").innerHTML = btnHTML;
    }

    function checkAnswer(clickedBtn) {
        const allBtns = document.querySelectorAll('#answer-buttons .btn');
        allBtns.forEach(b => b.disabled = true);
        clickedBtn.style.background = "#555";

        setTimeout(() => {
            questionIndex++;
            if (questionIndex >= currentQuestions.length) {
                alert("Nivån är slut! Spelet klippte exakt vid " + currentQuestions.length + " frågor.");
            } else {
                showQuestion();
            }
        }, 200);
    }
</script>
</body>
</html>
