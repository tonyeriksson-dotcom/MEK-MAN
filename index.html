<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>MEK-MAN: ULTIMATE PROFESSIONAL EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #wrapper { text-align: center; width: 95%; max-width: 850px; position: relative; }
        #game-title { font-size: 28px; color: #fff; margin-bottom: 25px; text-shadow: 5px 5px #ff0000; letter-spacing: 3px; }
        #quiz-container { border: 4px solid #fff; padding: 25px; background-color: #000; box-shadow: 12px 12px 0px #333; text-align: left; position: relative; }
        
        #stats { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 15px; align-items: center; }
        #lives-display { color: #ff0000; letter-spacing: 5px; font-size: 16px; }
        #score-display { color: #00ff00; }
        #lvl-display { color: #ffff00; }
        
        #header-info { display: flex; justify-content: space-between; margin-bottom: 15px; }
        #question-tracker { color: #ffff00; font-size: 10px; }
        #timer-display { color: #ff00ff; font-size: 10px; display: none; animation: pulse 1s infinite; }
        
        #question-text { font-size: 11px; line-height: 1.8; color: #00ff00; margin-bottom: 25px; min-height: 80px; text-transform: uppercase; border-left: 5px solid #00ff00; padding-left: 20px; }
        
        .btn { display: block; width: 100%; padding: 16px; margin: 10px 0; background: #000; color: #fff; border: 2px solid #fff; font-family: 'Press Start 2P', cursive; font-size: 9px; text-align: left; cursor: pointer; transition: 0.1s; }
        .btn:hover:not(:disabled) { background: #fff; color: #000; transform: translateX(8px); }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        
        #start-screen, #end-screen { text-align: center; padding: 20px 0; }
        input[type="text"] { font-family: 'Press Start 2P', cursive; background: #000; color: #00ff00; border: 2px solid #fff; padding: 15px; width: 80%; font-size: 12px; margin-bottom: 20px; text-align: center; text-transform: uppercase;}
        
        /* HIGH SCORE DESIGN */
        .leaderboard { text-align: left; font-size: 10px; line-height: 2; color: #00ff00; background: #111; padding: 20px; border: 2px dashed #333; margin-bottom: 20px;}
        .leaderboard-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        
        .flash-red { animation: blink 0.1s step-end 4; }
        @keyframes blink { 50% { background-color: #ff0000; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="game-title">★ MEK-MAN ★</div>

    <div id="quiz-container">
        
        <div id="start-screen">
            <div class="leaderboard">
                <div style="text-align:center; margin-bottom:10px; color:#fff;">--- TOP 10 HIGH SCORES ---</div>
                <div id="start-lb-content">Laddar resultat...</div>
            </div>
            <p style="font-size: 10px; line-height: 2.5; margin-bottom: 20px;">PRO-DATABASE LOADED.<br>ENTER NAME TO COMPETE.</p>
            <input type="text" id="player-name" placeholder="SKRIV DITT NAMN HÄR" maxlength="15">
            <button class="btn" style="text-align:center;" onclick="initGame()">[ STARTA DIAGNOSTIK ]</button>
        </div>

        <div id="game-area" style="display:none;">
            <div id="stats">
                <div>LVL:<span id="lvl-display">1</span></div>
                <div>SCORE:<span id="score-display">0000</span></div>
                <div id="lives-display"></div>
            </div>
            <div id="header-info">
                <div id="question-tracker"></div>
                <div id="timer-display">TID: 15s</div>
            </div>
            <div id="question-text">LADDAR...</div>
            <div id="answer-buttons"></div>
        </div>

        <div id="end-screen" style="display:none;">
            <h2 id="end-title" style="color:#ff0000; font-size:16px;">GAME OVER</h2>
            <p style="font-size: 10px; margin-bottom:20px;">DIN POÄNG: <span id="final-score"></span></p>
            <div class="leaderboard">
                <div style="text-align:center; margin-bottom:10px; color:#fff;">--- TOP 10 HIGH SCORES ---</div>
                <div id="end-lb-content">Laddar resultat...</div>
            </div>
            <button class="btn" style="text-align:center;" onclick="location.reload()">[ SPELA IGEN ]</button>
        </div>

    </div>
</div>

<script>
    // --- LEADERBOARD LOGIK ---
    function renderLeaderboards() {
        let lb = JSON.parse(localStorage.getItem('mekman_leaderboard') || '[]');
        let html = lb.length === 0 ? "<div style='text-align:center;'>INGA POÄNG ÄNNU! BLI DEN FÖRSTA!</div>" : lb.map((entry, i) => `<div class="leaderboard-row"><span>${i+1}. ${entry.name}</span><span>${entry.score} P</span></div>`).join('');
        document.getElementById('start-lb-content').innerHTML = html; 
        document.getElementById('end-lb-content').innerHTML = html;
    }

    function saveScore(name, finalScore) {
        let lb = JSON.parse(localStorage.getItem('mekman_leaderboard') || '[]');
        lb.push({ name: name.toUpperCase(), score: finalScore }); 
        lb.sort((a, b) => b.score - a.score); 
        lb = lb.slice(0, 10);
        localStorage.setItem('mekman_leaderboard', JSON.stringify(lb)); 
        renderLeaderboards();
    }

{ lvl: 3, q: "Hur många ledningar används rent fysiskt för att skicka data i ett High-Speed CAN-nätverk (Motor-CAN)?", r: "Två stycken kablar (CAN-High och CAN-Low)", f: ["En enda tjock fiberoptisk kabel", "Tre kablar (Signal, Jord och 5V-matning)", "Fyra ledningar (En för varje hjul)"] }, { lvl: 3, q: "Varför är kablarna i ett CAN-bus-system nästan alltid tvinnade runt varandra (Twisted pair)?", r: "För att skydda de digitala signalerna mot yttre elektromagnetiska störningar", f: ["För att kablarna tar mindre plats inuti de trånga kabelstammarna", "För att mekanikern enklare ska kunna dra isär dem med en tång", "För att öka det fysiska motståndet så kablarna blir varma och smälter snö"] }, { lvl: 3, q: "Vad ska motståndet (resistansen) vara mellan CAN-H och CAN-L i ett felfritt nätverk när batteriet är bortkopplat?", r: "Cirka 60 Ohm (två 120 Ohms termineringsmotstånd parallellkopplade)", f: ["Exakt 0 Ohm, de ska ha full kontakt med varandra", "Över 10.000 Ohm (Oändligt), de får absolut inte ha kontakt", "Cirka 12 Ohm, vilket motsvarar bilens normala batterispänning"] }, { lvl: 3, q: "Vad används ett LIN-nätverk (Local Interconnect Network) oftast till i moderna bilar?", r: "Att styra enklare, långsammare funktioner som fönsterhissar, speglar och stolsmotorer", f: ["Att skicka blixtsnabb data mellan ABS-enheten och motorstyrdonet vid sladd", "Att leverera strömmen till startmotorn under extrema minusgrader", "Att trådlöst uppdatera bilens mjukvara när den står parkerad i garaget"] },

        { lvl: 4, q: "Hur höjer en Intercooler motorns verkningsgrad i ett överladdat fordon?", r: "Kyler ner komprimerad överladdningsluft för högre syredensitet", f: ["Leder bort kokande kylvätska direkt från det heta avgashuset på turbinen", "Förvärmer insprutningsdieseln för att garantera en helt rökfri kallstart i minusgrader", "Bypass-kyler växellådsoljan genom en separat slinga monterad i frontens nederkant"] },
        { lvl: 4, q: "Vilken standardiserad varningsfärg omger bilens extremt farliga högspänningskablar (HV-system)?", r: "De är alltid mantlade i en skarp Orange skyddsfärg", f: ["De är markerade med klarröda ränder längs ett svart skyddshölje", "De skyddas av ett lysande Neongult korrugerat plaströr genom chassit", "De är omslutna av tjock, marinblå krympslang med varningsikoner tryckta på"] },
        { lvl: 4, q: "Vilken fysisk process använder Wastegate-ventilen för att förhindra fatalt övertryck i motorn?", r: "Den mekaniska ventilen öppnas och leder brännheta avgaser förbi själva turbinhjulet", f: ["Den stänger ner bränsletillförseln elektroniskt när insugstrycket passerar två bar", "Den skickar tillbaka all överskottsluft genom en ljudlig ventil rakt ut i atmosfären", "Den aktiverar den elektriska kylfläkten på högsta effekt för att kyla ner smörjoljan"] },
        { lvl: 4, q: "Vad gör en bil med Drive-by-wire-gaspedal (Elektronisk gasspjällsstyrning) i praktiken?", r: "Signalerar pedalens position elektriskt till styrdonet istället för via en fysisk stålvajer", f: ["Styr bilens riktning via en krypterad radiosignal (RF) sänd från fjärrkontrollen i nyckeln", "Levererar dubbla mängden högoktanigt bränsle direkt in i insuget när man trycker pedalen i botten", "Gör att bilen mer eller mindre flyger fram på grund av en extremt lättad kaross och avancerad chassiteknik"] },
        { lvl: 4, q: "Vad gör motorstyrdonet om det upptäcker ett kritiskt fel och aktiverar skyddsstrategin Limp Home?", r: "Kalkylerar ersättningsvärden och sänker uteffekten drastiskt för att rädda hårdvaran", f: ["Aktiverar autopiloten och styr bilen långsamt men säkert till närmaste märkesverkstad", "Stänger ner all kupéelektronik och går ner i ett extremt batterisparläge för att rädda cellerna", "Låser den automatiska växellådan permanent i läge Parkering tills felet har blivit nollställt"] },
        { lvl: 4, q: "Vad mäter en Hot-wire Luftmassemätare (MAF) när luften dras förbi sensorns tråd?", r: "Trådens avkylning, vilket ger en exakt kalkyl av den passerande luftens massa i gram per sekund", f: ["Det direkta undertrycket inne i plaströret som uppstår när bilens gasspjäll slås upp på vid gavel", "Gasspjällets fysiska öppningsvinkel i hundradels grader just precis i startögonblicket", "Relativ luftfuktighet och barometertryck för att avgöra om AC-kompressorn ska få kopplas in"] },
        { lvl: 4, q: "Vilken revolutionerande fördel ger ett turboaggregat med VNT (Variabel Nuzzel Turbin)?", r: "Genom att vrida skenorna i avgashuset maximeras turbons effektivitet och spol-up på låga motorvarv", f: ["Konstruktionen är helt fri från friktion vilket innebär att turbinen kan rotera i princip helt ljudlöst", "Aggregatet smörjs internt med ett fast fett vilket helt eliminerar behovet av yttre trycksatt motorolja", "Det höjer bilens absoluta toppfart med över 20% jämfört med ett traditionellt monterat aggregat"] },
        { lvl: 4, q: "Vilket avancerat chassi-säkerhetssystem hämtar oavbrutet livsviktig data från bilens Yaw-rate-sensor?", r: "ESP-systemet, som förhindrar livsfarliga sladdar genom att individuellt bromsa hjulen vid behov", f: ["ABS-systemet, som ser till att däcken inte ritas ut som svarta streck på asfalten vid en panikbromsning", "TPMS-systemet, som uppmärksammar föraren via en display-ikon ifall ett av däcken skulle börja pysa luft", "SRS Airbag-systemet, som utlöser gardinerna längs rutorna ifall bilen utsätts för en kraftig sidokollision"] },
        { lvl: 4, q: "Vad är kemikalien AdBlue (en vätska bestående av urea och renat vatten) och var sprutas den in?", r: "En miljölösning som doseras i avgasröret för att reagera med och oskadliggöra giftiga kväveoxider (NOx)", f: ["En extremt kraftfull bränsletillsats som blandas direkt i tanken för att radikalt höja dieselns cetantal", "En modern, frosttålig spolarvätska anpassad för fordon utrustade med xenon- eller LED-strålkastare", "Ett aggressivt tillsatsämne i kylarvätskan framtaget speciellt för att rensa rostiga och igensatta kylarkanaler"] },
        { lvl: 4, q: "Vad gör komponenten som kallas CAN-Gateway i en datastyrd personbil?", r: "Agerar avancerad tolk och trafikpolis för datapaket mellan nätverk med helt olika överföringshastigheter", f: ["Det är en kraftfull transformator som underhållsladdar startbatteriet när bilen är ansluten till vägguttaget", "Det är huvudreläet som slår till högspänningen till tändspolarna precis i det ögonblick startmotorn aktiveras", "Det är radar-enheten i fronten som mäter hastigheten och varnar om man håller på att krocka med bilen framför"] },
        { lvl: 4, q: "Vad avses när man inom diagnostik pratar om en Stökiometrisk bränsleblandning för bensin (Lambda 1.0)?", r: "Ett teoretiskt perfekt viktförhållande om 14.7 delar luft blandat med exakt 1 del oktanigt bränsle", f: ["Ett väldigt magert driftläge där man blandar in 10 liter ren syrgas för varje enskild liter insprutad bensin", "Ett perfekt synkat tryckförhållande där trycket i insuget är exakt 1 bar över atmosfärstrycket (övertryck 1:1)", "Ett extremt fett bränsleläge (förhållande 20:1) designat specifikt för att hålla ventilerna kylda vid ban-racing"] },
        { lvl: 4, q: "Vad är den tekniska storheten med moderna Piezo-elektriska bränslespridare i dieselmotorer?", r: "De expanderar under spänning och möjliggör mikrosekunds-snabba och flerfaldiga insprutningar per takt", f: ["De är plastgjutna och därför extremt billiga att byta ut i klump under en vanlig bilverkstadsservice", "De förlitar sig enbart på atmosfäriskt tryck, vilket gör högtryckspumpen helt överflödig i motorns design", "De är utrustade med små inbyggda högtalare som vibrerar loss eventuellt sot som byggts upp kring spetsen"] },
        { lvl: 4, q: "Varför utrustas vissa strikta miljökravsmotorer med två seriekopplade katalysatorer (en Pre-Cat nära blocket)?", r: "För att startkatalysatorn blir glödhet omedelbart, vilket renar de annars ofiltrerade och giftiga kallstartsavgaserna", f: ["För att bilens konstruktion skall klara av att generera över hundra hästkrafter extra vid ett fullt gaspådrag på sexans växel", "För att sänka den totala decibelnivån på utblåset så kraftigt att biltillverkaren kan slopa de tunga, bakre ljuddämparna helt", "För att de dubbla kemiska processerna skapar så mycket extrem hetta att motorn når full driftstemperatur på under tio sekunder"] },
        { lvl: 4, q: "Vilket globalt diagnos-begrepp gömmer sig bakom förkortningen E-OBD?", r: "European On-Board Diagnostics - En standard för övervakning och utläsning av utsläppspåverkande komponenter", f: ["Electronic Overhead Braking Device - En inbyggd nödbroms som sitter monterad i bilens takkonsol nära vindrutan", "Extra Oil By-pass Duct - Ett specialrör under oljetråget designat för att hantera plötsliga och livsfarliga tryckökningar i sumpen", "Electric Operational Battery Drive - Det specifika el-läge som en hybridbil använder när bensinmotorn är mekaniskt urkopplad"] },
        { lvl: 4, q: "Vad gör det vibrationskänsliga elementet inuti bilens Knacksensor?", r: "Lyssnar fokuserat på motorblocket efter de högfrekventa och skadliga tryckvågor som uppstår vid okontrollerad spikning", f: ["Känner blixtsnabbt av om någon av bilens fyra dörrar, eller bagageluckan, oavsiktligt har svängt upp under en kraftig inbromsning", "Mäter med laserprecision exakt hur mycket spänning och obalans som ackumulerats i bilens framdäck under de senaste månaderna", "Fungerar som en avancerad antenn som oavbrutet letar efter störande frekvenser från närliggande analoga FM-radiostationer"] },
        { lvl: 4, q: "I många fyr- och trecylindriga radmotorer ligger balansaxlar dolda i tråget. Vad är deras uppgift?", r: "Att rotera synkroniserat men i motsatt riktning för att ta ut och dämpa masskrafternas inbyggda vibrationer", f: ["Att via en kuggrem driva den känsliga vattenpumpen med hundraprocentig precision under hela motorns kalkylerade livslängd", "Att mäta vevaxelns exakta position och skicka denna kritiska data som en digital RPM-signal direkt in i instrumentklustret", "Att pressa upp smörjolja under skyhögt tryck upp mot den överliggande kamaxeln så fort motorn känner av minsta slitage"] },
        { lvl: 4, q: "Hur fungerar en växellåda av typen DCT/DSG (Dual-Clutch Transmission) i grunden?", r: "Ett system där lådan är splittad på två inre axlar och två kopplingar, vilket gör att nästa växel kan ligga i förväg", f: ["En renodlad elbilstransmission där två gigantiska elmotorer arbetar i fullständig tandem utan någon koppling öht", "Ett äldre smörjsystem som eliminerar allt behov av olja eftersom kuggarna är coatade med dubbla lager syntetisk teflon", "En gigantisk manuell växellåda som alltid kräver att föraren gör ett manuellt dubbeltramp på pedalen för att undvika skrap"] },
        { lvl: 4, q: "Vad möjliggörs i motorn genom tekniken VVT (Variable Valve Timing)?", r: "Att kamaxlarnas gradering kan förskjutas hydrauliskt under drift, vilket optimerar fyllnadsgraden i cylindrarna på alla varv", f: ["Att insugsventilerna rent fysiskt byter storlek från millimeter till centimeter beroende på hur hårt man trampar ner gasen", "Att styrboxen digitalt stänger av gnistan till hälften av alla cylindrar så fort man rullar i nedförsbacke för att spara soppa", "Att ett extremt kallt vattenflöde styrs direkt över topplocket för att motverka den brutala värmen som uppstår i köerna"] },
        { lvl: 4, q: "Vad är den absolut viktigaste uppgiften för en Differenstryckgivare (Delta-P) ansluten till ett DPF?", r: "Att mäta tryckskillnaden före och efter dieselpartikelfiltret för att låta styrdonet beräkna den exakta sotfyllnadsgraden", f: ["Att noggrant övervaka skillnaden i däcktryck mellan de främre och de bakre hjulen och skicka larmet via CAN-bussen till displayen", "Att agera som en digital oljetrycksvakt i botten av sumpen som bryter strömmen till spridarna ifall nivån sjunker för lågt", "Att säkerställa att turbons tryck inte på något sätt överskrider de fabrikssatta gränserna, även vid chiptrimning"] },
        { lvl: 4, q: "Inom modern bilelektronik nämns ofta komponenttypen SOIC. Vad beskriver förkortningen?", r: "Small Outline Integrated Circuit - En liten kretskrets (chip) ytmonterad direkt på moderkortet i en styrenhet", f: ["Standardized Oil Index Classification - En strikt kvalitetsmärkning för helsyntetiska och extremt tåliga motoroljor", "Silicone Original Inner Core - Den patenterade gummiblandning som används i stommen på tysta europeiska friktionsdäck", "Safe Overhead Impact Control - En mekanisk bromsmetod i chassit framtagen enbart för att rädda liv vid våldsamma älgolyckor"] },
        { lvl: 4, q: "Hur löser man tryckbehovet i en GDI-motor (Gasoline Direct Injection) där spridarna arbetar i förbränningsrummet?", r: "Bränslet trycksätts mekaniskt via en dedikerad högtryckspump, oftast kamaxeldriven, som levererar upp till 200 bar", f: ["Den klassiska elektriska matarpumpen i tanken uppgraderas med tjockare kablar för att själv pumpa kylarvatten till toppen", "Man förlitar sig på det naturliga vakuumet som bildas när kolven rusar nedåt och suger i sig både olja och bränsleblandning", "Hela systemet drivs via en massiv extern 48-volts elmotor som pumpar soppa i proportion till hur fort hjulen snurrar"] },
        { lvl: 4, q: "Vad menas kemiskt när fordonsindustrin pratar om efterbehandlingssystemet SCR?", r: "Selective Catalytic Reduction - Ett processkärl där kväveoxider omvandlas till ofarlig kvävgas och vatten m.h.a. urea", f: ["Super Charged Resonator - En sportig avgasventil byggd av rostfritt titan som öppnas på vid gavel vid hastiga gaspådrag", "Smart Current Relay - Ett avancerat laddningssystem designat för att intelligent maximera generatorns livslängd i kylan", "Super Clean Reflux - En helt ny reningsmetod som centrifugerar de heta avgaserna tills allt kol faller ner i en asklåda i avgasröret"] },
        { lvl: 4, q: "Vilken typ av information överförs inuti den lilla kabeln till bilens Oljekvalitetssensor?", r: "Den analyserar oljans dielektriska egenskaper, nivå och temperatur för att dynamiskt räkna ut när service krävs", f: ["Den inspekterar oljans exakta nyans med en optisk lins och skickar en RGB-färgkod i hex-format direkt till displayen", "Den mäter den fysikaliska volymen av vätska i tråget ner på millimetern och slår alltid ifrån pumpen om en droppe saknas", "Den samlar in ett luktprov genom ett litet keramiskt rör och varnar om oljan har antagit en karakteristisk doft av bränd mandel"] },
        { lvl: 4, q: "Vad är den aerodynamiska funktionen hos systemet Active Grille Shutters i fronten på en bil?", r: "Stänger jalusier framför kylaren för att sänka luftmotståndet i landsvägsfart och påskynda motorns uppvärmningsfas", f: ["Ett kraftigt stålgaller fälls ner elektriskt över strålkastarna för att skydda de extremt dyra LED-linserna från stenskott", "De riktar tusen Lumen starka strålkastarljus rakt ner mot asfalten när radarn känner av att man kör in i en mörk tunnel", "Fläktbladen reverseras blixtsnabbt för att under extremt varma sommardagar suga in iskall AC-luft till det överhettade blocket"] },
        { lvl: 4, q: "När en hjullager-nav är utrustat med en Magnetoresistiv givare för ABS:en, hur fungerar avläsningen?", r: "Givaren reagerar elektroniskt på en inbyggd magnetring i packboxen, vilket ger en perfekt digital fyrkantsvåg även i krypfart", f: ["Sensorn är ett simpelt metallrör fyllt med bromsvätska som trycksätts mekaniskt varje gång tandhjulet passerar en viss gräns", "Den läser av bromsskivans exakta yttemperatur via infrarött ljus och skickar larmet till datorn om metallen börjar glöda", "Givaren är en finstämd mekanisk våg som konstant mäter hur många kilo som vilar på det specifika hjulet under körning"] },
        { lvl: 4, q: "Vad hittar du inuti lådan som i kopplingsschemat kallas Power Distribution Box / PDM?", r: "Ett samlat och skyddat nav av storsäkringar, maxi-reläer och kraftmatningar till bilens mest strömslukande styrenheter", f: ["Det är den dolda svarta boxen som avlyssnar och underhållsladdar förarens smartphone via den trådlösa QI-plattan i mittkonsolen", "Ett digitalt kontrollcentrum med tusentals knappar som styr bilens ljudanläggning, radiokanaler och GPS-navigering", "Det mekaniska navet i bilens bagageutrymme där föraren snabbt kan plocka fram reservhjul, domkraft och en fälgkors-nyckel"] },
        { lvl: 4, q: "Vilken kördynamisk fördel erhålls med en bakaxel utrustad med Torque Vectoring?", r: "Drivkraften fördelas blixtsnabbt över till det yttre bakhjulet i en kurva, vilket tvingar in bilen i svängen likt en bandvagn", f: ["En mekanisk stålaxel fälls ner och mäter vridmomentet mot asfalten, varpå den låser den aktuella växeln tills kurvan rätats ut", "Ett intelligent system känner av att föraren gör ett kast och vrider bilens bakhjul upp till femtio grader för att hjälpa till med sladden", "Styrboxen kapar motorns tändning helt och hållet, och applicerar max broms på alla fyra hjulen för att häva spinn omedelbart"] },
        { lvl: 4, q: "Vad gör EVAP-systemet (Evaporative Emission Control System) för miljön, ofta med hjälp av en kolkanister?", r: "Det samlar upp extremt flyktiga och giftiga kolväteångor från bränsletanken och suger in dem i motorn för förbränning", f: ["Det är en jättelik kylfläns bakom motorn som förvandlar all utstrålad värme till ren AC-kyla för passagerarna under heta dagar", "Det drar in sura avgaser direkt från avgasrörets slutrör och pressar dem genom ett livstidsfilter för att tvätta dem med vatten", "Det säkerställer att all omgivande luft som sugs in genom grillen filtreras från partiklar innan den får träffa luftmassemätaren"] },
        { lvl: 4, q: "Hur fungerar laddningsstrategin i en bil med Smart Charge (Intelligent Generatorstyrning)?", r: "Motorstyrdonet stänger av laddningen vid acceleration för maxeffekt, och maximerar den vid motorbroms", f: ["Generatorn är försedd med en artificiell intelligens som känner igen förarens röst och därmed alltid ger hela 24 Volt vid minusgrader", "Generatorn är helt eliminerad och utbytt mot solceller på biltaket som laddar ett massivt 48V-batteri placerat under baksätet", "Systemet varnar när generatorremmen är sliten genom att skicka ut en stark stöt genom ratten så föraren måste stanna på stört"] },
{ lvl: 4, q: "Vad måste ofta göras med ett diagnosverktyg när man byter bromsbelägg bak på en bil med Elektrisk Parkeringsbroms (EPB)?", r: "Backa de elektriska bromsoksmotorerna till serviceläge innan man pressar in kolven", f: ["Kalibrera ABS-pumpens tryckgivare", "Bränna in de nya beläggen med ett speciellt bromsprogram", "Koppla ur bilens högvoltsbatteri helt"] }, { lvl: 4, q: "Du ska lufta ett modernt ABS-system där bytet inneburit att ABS-hydraulaggregatet (HCU) dragit in luft. Vad krävs oftast för en framgångsrik luftning?", r: "Ett diagnosverktyg för att köra ABS-pumpen och öppna ventilerna internt under luftningen", f: ["Att man bara pumpar hårt på bromspedalen 50 gånger i rad", "Att man låter bilen stå över natten så luften stiger till behållaren", "Att man fyller systemet från bromsoken och trycker vätskan uppåt med en kompressor"] }, { lvl: 4, q: "Vad mäter en girvinkelsensor (Yaw rate sensor) i bilens ESP-system?", r: "Bilens rotation (girning) kring sin egen lodräta axel (vertikalaxeln)", f: ["Lutningen på karossen när man kör uppför en brant backe", "Hur snabbt ratten vrids i grader per sekund", "Skillnaden i varvtal mellan fram- och bakaxel"] }, 
{ lvl: 4, q: "I ett avancerat Common Rail-system, vad innebär begreppet 'Pilotinsprutning' (Pilot Injection)?", r: "En pytteliten bränslemängd sprutas in precis före huvudinsprutningen för att minska knackningar och sänka tryckstegringen", f: ["Bränsle som medvetet sprutas in i avgastakten enbart för att kyla ner den varma turbon", "En nöd-insprutning som endast aktiveras när styrdonet går in i felsäkert Limp Home-läge", "En stor mängd bränsle som sprutas in i exakt det ögonblick som föraren släpper upp gaspedalen"] }, { lvl: 4, q: "Vad har 'Mängdreglerventilen' (MPROP / VCV / IMV) för uppgift på en diesels högtryckspump?", r: "Den styr hur mycket bränsle som matas in i pumpens kompressions-element, och reglerar därmed railtrycket effektivt", f: ["Den bestämmer i exakt vilken ordningsföljd cylindrarnas spridare ska öppna", "Den fungerar som en mekanisk övertrycksventil som dumpar bränsle tillbaka till tanken vid extremfall", "Den är ansvarig för att blanda in exakt rätt mängd AdBlue i dieseln strax innan insprutning"] }, { lvl: 4, q: "Vad händer med pumpströmmen (Pump Current) i en Bredbandslambdasond när motorn går perfekt på exakt Lambda 1.00?", r: "Strömmen som mäts upp ligger stadigt på 0 mA (noll milliampere)", f: ["Strömmen slår i taket och mäter sitt absoluta maxvärde på runt 5 mA", "Spänningen över sonden låser sig på exakt 12,0 Volt via ett internt relä", "Sondens inre uppvärmningsmotstånd sjunker omedelbart till 0 Ohm"] }, 
{ lvl: 4, q: "Du mäter på ett aktivt CAN-High Speed nätverk med multimeter. Vilka spänningsnivåer (Volt) bör du se på ett ungefär?", r: "Båda vilar på 2,5V. Vid aktivitet går CAN-H upp (mot 3,5V) och CAN-L går ner (mot 1,5V)", f: ["Båda vilar på 0V. Vid aktivitet hoppar båda upp till 12V samtidigt", "CAN-H ligger konstant på 14V och CAN-L ligger konstant på 0V", "Båda pendlar extremt snabbt mellan minus 5V och plus 5V"] }, { lvl: 4, q: "Vad gör 'Gateway'-styrdonet (Diagnosgränssnittet) i bilens nätverksarkitektur?", r: "Det fungerar som en tolk som kopplar ihop och översätter data mellan olika nätverk (t.ex. Motor-CAN och Infotainment-CAN)", f: ["Det stänger av bränslepumpen automatiskt vid en kollision för att förhindra brand", "Det ser till att torkarbladen alltid återvänder till sitt viloläge när tändningen bryts", "Det krypterar bilens radiokanaler så att obehöriga inte kan tjuvlyssna"] }, { lvl: 4, q: "Vad spänning (Volt) mäter du normalt på kommunikationskabeln i ett LIN-bus-system när nätverket 'sover' (är inaktivt)?", r: "Ungefär samma som bilens batterispänning (ca 12V) via ett pull-up-motstånd i master-enheten", f: ["Absolut noll Volt (0V), systemet är helt strömlöst för att spara energi", "Alltid exakt 5,0 Volt eftersom det matas från en intern spänningsregulator", "En negativ spänning på cirka -2,5 Volt för att stöta bort magnetiska fält"] }, 

        // NIVÅ 5 (Felsökning & Nätverk)
        { lvl: 5, q: "Hur mycket Ohm mäter du om du sätter pinnarna mellan CAN-High och CAN-Low i ODB-uttaget på ett avstängt och friskt fordon?", r: "Mätaren kommer att stabilisera sig på ganska exakt 60 Ohm (två 120 Ohms motstånd parallellt)", f: ["Instrumentet visar O.L (Oändlighet) vilket innebär att kretsen är perfekt bruten och isolerad", "Mätaren kommer att ge ett utslag på exakt 0 Ohm, vilket bekräftar att bussen är en sluten slinga", "Resistansen i ett high-speed nätverk överstiger alltid 1000 Ohm för att spänningen ska orka fram"] },
        { lvl: 5, q: "Vad letar du efter med ett oscilloskop om du ställer in triggern på flank-detektering på en Hall-givare?", r: "En perfekt och helt fri från störningar fyrkantsvåg där tidsaxeln visar pulsvidden exakt", f: ["Du mäter hur många milliampere som krävs för att givarens magnetfält ska slå runt helt", "Ett tydligt bevis på att resistansen inuti komponenten växlar takt i takt med däckets rotation", "En mjuk och fin sinusvåg utan hack, vilket bevisar att magnetens induktans är oskadd"] },
        { lvl: 5, q: "När ett diagnosverktyg plockar upp en Freeze Frame, vad är det den egentligen visar mekanikern?", r: "En ögonblicksbild av relevanta parametrar exakt i den tusendel felkoden registrerades", f: ["En animation på skärmen som totalt låst sig eftersom datorns RAM-minne blivit översvämmat av fel", "Den visar exakt vid vilken minusgrad kylarvätskan riskerar att frysa och spränga motorblocket", "En varning om att bilens inbyggda stöldskyddssystem har stängt ner och fryst hela startmotorns funktion"] },
        { lvl: 5, q: "Du har en felkod på Misfire Cyl 2. Vilken parameterkombination (STFT & O2) ser du oftast i livedata?", r: "Korttidsbränslet (STFT) sticker iväg upp mot +20% eftersom syresensorn mäter för mycket oförbränt syre", f: ["Båda värdena låser sig blixtsnabbt på noll, då styrenheten helt bryter all ström in till berörd spridare", "Korttidsbränslet sjunker ner mot -20% då styrenheten försöker stänga spridaren för att spara katalysatorn", "Syresensorn (O2) skickar en ren 12V-signal rakt in i styrenheten, vilket kortsluter den interna CAN-bussen"] },
        { lvl: 5, q: "Vad är arbetsmetodiken vid felsökning med Spänningsfallsmätning (Voltage Drop)?", r: "Man mäter spänningen över kablage/kontakt under belastning för att avslöja ett dolt övergångsmotstånd", f: ["Man stänger av bilens tändning och ohmmäter varje centimeter av en kabel tills man hittar ett brott", "Man kopplar in en massiv last över batteripolerna och räknar minuterna tills spänningen dippar under 10V", "Man mäter hur många Volt säkringen klarar innan den brinner av genom att kortsluta komponenten i fråga"] },
        { lvl: 5, q: "Du ska tryckprova ett tömt AC-system. Vilken gasblandning är det enda lagliga och korrekta valet för jobbet?", r: "En blandning kallad Formiergas, bestående av 95% inert kvävgas och 5% väte som spårämne", f: ["Extremt komprimerad och iskall koldioxid (CO2) tryckt direkt ur en modifierad brandsläckartub", "Ren och högkoncentrerad svetsargon som lyser upp kraftigt i mörker om det uppstår minsta läckage", "Den tryckluft som produceras av verkstadens kompressor, förutsatt att den filtrerats från smuts och olja"] },
        { lvl: 5, q: "En givare styrs av en PWM-signal (Pulse Width Modulation). Vad mäter du när du kollar Duty Cycle?", r: "Den procentuella tiden som signalen är i ett aktivt tillstånd under en enda fullständig cykel", f: ["Exakt hur många tusen gånger per sekund som signalen slår över från positiv till negativ pol", "Den maximala toppspänningen som styrenheten klarar av att trycka ut innan reläet brinner upp", "Den statiska laddningstiden som krävs innan givarens inre kondensator är fullt uppladdad med Volt"] },
        { lvl: 5, q: "Hur skiljer sig nätverksarkitekturen i en LIN-buss rent tekniskt jämfört med en snabb CAN-buss?", r: "Den består av en enda koppartråd, jobbar med lägre baud-rate och styrs strikt av en Master-styrenhet", f: ["Den bygger helt och hållet på trådlös teknik och överför data via samma frekvenser som Bluetooth-chippet", "Den är uppbyggd av fiberoptiska plastkablar där ljusblixtar hanterar all kommunikation i ljusets hastighet", "Den kräver hela 24 Volt för att kunna arbeta eftersom den saknar jordpunkt och drar massivt med ampere"] },
        { lvl: 5, q: "Vad pekar den generiska OBD-II-felkoden P0300 med stor sannolikhet på för typ av maskinellt trubbel?", r: "Styrenheten har registrerat generella/slumpmässiga misständningar utspridda över flera cylindrar", f: ["Det inre trycket i bilens gigantiska och heta turboladdare har under en längre tid överskridit alla gränsvärden", "Datorn som ansvarar för de Låsningsfria Bromsarna (ABS) saknar nödvändig matningsspänning på stift 14", "Oljetrycket djupt nere i det bakre lagret på vevaxeln har fallit under den kritiskt satta gränsen på 0.5 bar"] },
        { lvl: 5, q: "I moderna elbilar hittar man ofta en givare kallad Resolver. Var sitter den och vad mäter den?", r: "Den är monterad direkt på elmotorns axel och mäter rotorns absolut exakta, mekaniska vinkelposition", f: ["Den är inbyggd i den översta battericellen och kalkylerar den procentuella laddningen som gått förlorad", "Den är en kylklammer runt inverterns transistorer som känner av och justerar kylvätskans flöde i millisekunder", "Det är en radar monterad i frontens emblem som exakt mäter hur många meters avstånd man håller till bilen framför"] },
        { lvl: 5, q: "Vad gör Battery Management Systemet (BMS) i ett elbilsbatteri när det utför Cell Balancing?", r: "Det blöder av energi från de celler som har högst spänning för att låta de svagare cellerna hinna ikapp vid laddning", f: ["Det flyttar rent fysiskt vikten inuti batteripaketet för att bilens fjädring och däckslitage ska bli 100% jämnt", "Det ställer hjulens individuella camber-vinklar elektroniskt för att balansera upp framvagnens dynamik i kurvor", "Det pumpar ut en massiv strömpuls på hundratals Ampere för att kalibrera bilens dolda vikt-sensorer under sätet"] },
        { lvl: 5, q: "Du sätter en Ampere-tång runt batteriets minuskabel och startar motorn. Vad tittar du på vid Relative Compression-testet?", r: "Man ser startmotorns pulserande strömförbrukning på oscilloskopet, vilket direkt avslöjar om någon cylinder är svag", f: ["Man mäter det faktiska kompressionstrycket uppgett i enheten Bar för att se om topplockspackningen har separerat", "Man mäter exakt hur mycket brännhet olja som pumpas ut till den överliggande kamaxeln i sekunderna efter startögonblicket", "Man vill kontrollera hur exakt tajmingen i millimeter är mellan kamaxeln och de extremt hårt spända ventilfjädrarna"] },
        { lvl: 5, q: "I en verkstadshandledning för ett HV-batteri står det om Inter-lock kretsen. Vad säkerställer denna inbyggda trygghet?", r: "Det är en klenspännings-slings som genast bryter de massiva huvudkontaktorerna om ett högvolts-lock demonteras", f: ["Det är den mekaniska låsmekanismen gjord i pansarstål som låser fast alla bildörrar ifall någon försöker stjäla batteripaketet", "Det är kylarfläktens direkta nöd-startfunktion som drar igång om motorns och batteriets samlade termometrar överstiger 90 grader", "Det är namnet på den avancerade mjukvara som styr hur elmotorn dynamiskt samverkar med växellådans planetväxelsystem"] },
        { lvl: 5, q: "Många nyare fordon övergår från CAN till systemet FlexRay för viktiga bussar. Vad utmärker FlexRay-nätverket?", r: "Det har extremt mycket högre överföringshastighet (ofta 10 Mbps) och är klocksynkroniserat (Tidstyrt)", f: ["Det är ett helt öppet trådlöst nätverk som gör att vem som helst kan ladda ner mjukvara utan irriterande sladdar", "Det är i grunden tillverkat av guld istället för koppar för att helt bli av med det inre motståndet i de varma kablarna", "Det använder en enda jättestor central dator för allt, istället för de utspridda nätverk av små styrenheter vi ser idag"] },
        { lvl: 5, q: "Du felsöker ett kabelbrott. Multimetern visar 0 Volt mot jord, oavsett status. Vad kallar vi detta klassiska mätfel?", r: "En solid Kortslutning till Jord, kabelns isolering har skavts bort och kardelerna nuddar nu plåten", f: ["En total Kortslutning till Spänning, kabeln ligger dikt an mot batteriets pluspol vilket smält plasten", "Ett Öppet Kretsbrott, kabeln är visserligen helt av på mitten men ändarna svävar fritt i tomma intet", "En Parallell Induktans, kabeln delar sin energi med en bredvidliggande komponent vilket slukar spänningen"] },
        { lvl: 5, q: "Inom säkerhetsstandarder för bilelektronik nämns ASIL D. Vad representerar detta certifikat?", r: "Det är den absolut strängaste klassningen av säkerhet för system vars fallissemang kan leda till omedelbar dödskrasch", f: ["Det är märkningen för hur extremt tålig en modern el-motorolja är när den körs på autobahn-hastigheter i plus 30 grader", "Det är den globala storleksstandarden som däck och fälgtillverkare måste följa när de pressar nya däckstämplar till SUV:ar", "Det är namnet på den låda av isolerande verktyg som varenda bilmekaniker lagligen måste ha när de pillar på en startmotor"] },
        { lvl: 5, q: "Varför används det tunga gränssnittet J2534 ofta ute på den moderna bilverkstaden?", r: "Det är den universella standarden för Pass-Thru vilken tillåter oberoende verkstäder att ladda mjukvara från märkes-servern", f: ["Det är den absolut mest tåliga och dyraste skruvgängan som existerar, designad för att palla trycket i hjulnaven på lastbilar", "Det är namnet på den enorma bromsskiva i keramisk kolfiber som sällsynt monteras framtill på extrema superbilar på bana", "Det är den svindyra specifikation som krävs på den tjockflytande syntetiska olja som måste i växellådan vid exakt tiotusen mil"] },
        { lvl: 5, q: "Vad gör komponentblocket DC/DC Converter som sitter undangömt under skalet i en elbil/hybrid?", r: "Det förvandlar det enorma 400V högvoltspaketet ner till hanterbara 12V så bilens stereo och lampor inte sprängs", f: ["Det konverterar likströmmen från cellerna till en växlande trefasström (AC) som sedan skickas ner direkt i drivmotorn", "Det agerar som en massiv väggladdare som drar ström från husets elnät och trycker in det i batteriet på nolltid under natten", "Det agerar en tyst reservgenerator som startar bilens fysiska bensinmotor om el-batteriet mot förmodan skulle tömmas helt"] },
        { lvl: 5, q: "Vad analyseras när en bilelektriker pratar om nätverkets Signal-to-Noise Ratio (SNR) på sitt oscilloskop?", r: "Avståndet mellan den starka datavågen och det grusiga, elektromagnetiska bruset i bakgrunden", f: ["Den totala ljudvolymen från bilens avgassystem i relation till det lilla dova morret som kommer uppifrån motorns luftinsug", "Bredden på däcken i millimeter delat med den irriterande resonans de skapar mot asfalten under en långkörare i motorvägsfart", "Det öronbedövande trycket i decibel som bilens ljudanläggning förmår spruta ut innan radions inbyggda säkring slår ut allt"] },
        { lvl: 5, q: "I en elbil finns en Insulation Monitoring Device. Vilket kritiskt uppdrag har den dygnet runt?", r: "Att bryta nätet om minsta lilla millivolt HV-läckström letar sig över till chassits ojordade plåt", f: ["Att konstant koda om luftfuktighetens parametrar för att varna om däcktrycket faller lägre än två bar", "Att noga och extremt vaksamt läsa av kylvätskans kemiska pH-balans för att förebygga rost inne i motorblocket", "Att aktivt skicka ut störande ljudvågor i passagerarkupén för att ta bort det aerodynamiska vindbruset från sidospeglarna"] },
        { lvl: 5, q: "Du mäter +12V matning och <1 Ohm Jord på Rätt Stift i en ECU. Nätverket har 60 Ohm, men ingen kontakt. Domslut?", r: "Det finns inget annat svar än att hårdvaran eller kiselchippet inuti den plomberade styrenheten är internt defekt", f: ["Felet ligger garanterat djupt begravt inuti själva instrumentklustrets skärmdator som måste demonteras", "Det är fel lufttryck i vänster framdäck vilket har fått säkerhetssystemet att panikstänga all digital kommunikation", "Datorn saknar bensin i systemet och har fryst alla nätverkskommandon tills tankmätarens flottör lyfts manuellt"] },
        { lvl: 5, q: "När biltekniker utför ett s.k. Burst-test på en krånglande databuss, vad utsätter de systemet för?", r: "De bombarderar nätverket avsiktligt med tunga, massiva datapaket för att provocera fram svagheter vid extrem trafiklast", f: ["De blåser upp det platta bildäcket inuti en gigantisk stålbur fram tills det smäller för att exakt avgöra brustrycket", "De trampar bromspedalen brutalt ner i golvet på en rullande landsväg för att kalkylera exakt på millimetern när skivan spricker", "De smäller av krockkudden i ratten med en elektrisk stöt för att tidsbestämma exakt hur snabbt krutladdningen aktiveras"] },
        { lvl: 5, q: "Vilket jobb har de enorma transistorerna inuti komponenten Inverter i en elbil?", r: "Att oavbrutet och blixtsnabbt switcha/omvandla batteriets likström (DC) till trefasig växelström (AC) för motorn", f: ["Att kontinuerligt underhållsladda det lilla blybatteriet under motorhuven så att radio, ljus och AC-kompressor kan rulla", "Att effektivt suga åt sig strömmen från laddstolpen och i lugn takt trycka in den djupt inne i bilens golvmonterade batteri", "Att rent mekaniskt utföra själva växlingarna mellan ettan och sexan inuti transmissionen, helt utan att föraren märker det"] },
        { lvl: 5, q: "Hur skulle en duktig mekaniker använda sig av Active/Ställtest inuti sitt diagnostikverktyg?", r: "Som ett mäktigt verktyg för att via laptoppen tvinga en ECU att slå på en fysisk komponent (t.ex pumpen) för bekräfta funktion", f: ["Som ett digitalt instrument för att spela in och rita upp bilens effekt och vridmoment när den plågas på rullande landsväg", "Som en voltmeter för att kontrollera exakt i detalj hur många ström-enheter som gömmer sig djupt inuti startbatteriet", "Som en linjal för att elektroniskt skanna av och bedöma mönsterdjupet och slitagegraden på däcken innan bilprovningen"] },
        { lvl: 5, q: "Bilen producerar en tung, sötaktig Vit Rök ur avgasröret och nivån i expansionskärlet sjunker ständigt. Diagnos?", r: "Brusten Topplockspackning, kylarvätskan rinner rakt ner i förbränningsrummet och förångas ut som vit rök", f: ["Turbinens inre lager-tätningar har gett vika helt och oljan piskas skoningslöst rakt ut i glödheta avgashuset", "Själva huset på växelströmsgeneratorn har spruckit på mitten och laddningsregulatorns inre elektrolyt förbränns", "Mekanismen inne i oljepumpen har kärvat fast på grund av smuts och trycker nu in all motorolja rakt upp i plastinsuget"] },
        { lvl: 5, q: "Vad är det för kemisk finjustering som sker när systemet justerar Short Term Fuel Trim (STFT)?", r: "Det är styrenhetens justering av spridarnas insprutningstid för att svara på syresensorns allra minsta lilla spänningsförändring", f: ["Det är den avancerade typen av snabbväxlande och fjäderbelastad sekventiell växellåda som sitter monterad i dyra bilar", "Det är ett nyskapande och extremt kort tändstift som togs fram specifikt för att klämmas in i de trånga V6-motorerna", "Det är den revolutionerande nya batteritekniken som tillåter en snabbladdning av litiumcellerna från noll till åttio procent på fem minuter"] },
        { lvl: 5, q: "Vad drabbas kunden garanterat av ifall de råkar polvända (Svart på Plus, Röd på Minus) starka startkablar?", r: "Den enorma chocken av felriktad el leder till ofrånkomliga och mycket dyra, smälta kretskort inne i datorboxarna", f: ["Bilen startar förvånansvärt nog precis som vanligt, enda skillnaden är att bränslepumpen kommer snurra lite extra fort", "Strålkastarljuset slår om och blir starkare tills kablarna börjar glöda och gummiisoleringen faller i bitar", "Gummit i framdäcken oxiderar snabbt på grund av statisk spänning, vilket leder till att slitbanan separerar"] },

    const questionsPerLevel = [15, 15, 15, 15, 15]; 
    let currentPlayerName = "";
    let currentLevel = 1;
    let score = 0;
    let lives = 3;
    let currentQuestions = [];
    let questionIndex = 0;

    // --- BONUSRUNDA VARIABLAR ---
    let inBonusRound = false;
    let bonusCorrectCount = 0;
    let bonusTimer;
    let timeLeft = 15;

    renderLeaderboards();

    function initGame() {
        const nameInput = document.getElementById("player-name").value;
        if(nameInput.trim() === "") return alert("SKRIV IN ETT NAMN FÖR ATT STARTA!");
        
        currentPlayerName = nameInput.trim();
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-area").style.display = "block";
        
        currentLevel = 1; score = 0; lives = 3; 
        startLevel();
    }

    function startLevel() {
        if(currentLevel > 5) { 
            document.getElementById("end-title").innerText = "GRATTIS DU VANN!";
            document.getElementById("end-title").style.color = "#00ff00";
            return gameOver();
        }

        let numQuestions = questionsPerLevel[currentLevel - 1] || 15;
        
        // Laddar ENBART vanliga frågor (inte bonus)
        let levelQs = allQuestions.filter(q => q.lvl === currentLevel && !q.bonus);
        levelQs = levelQs.sort(() => 0.5 - Math.random());
        currentQuestions = levelQs.slice(0, numQuestions);
        
        questionIndex = 0;
        updateUI();
        showQuestion();
    }

    function startBonusRound() {
        inBonusRound = true;
        bonusCorrectCount = 0;
        
        // Hämtar bonusfrågorna för denna nivå
        let levelBonusQs = allQuestions.filter(q => q.lvl === currentLevel && q.bonus === true);
        
        // Om det inte finns några bonusfrågor, hoppa direkt till nästa nivå
        if(levelBonusQs.length === 0) return endBonusRound();

        levelBonusQs = levelBonusQs.sort(() => 0.5 - Math.random());
        currentQuestions = levelBonusQs.slice(0, 5); // Drar exakt 5 bonusfrågor
        questionIndex = 0;

        // Ändra designen för bonusrundan
        document.getElementById("game-title").innerText = "★ BONUSRUNDA ★";
        document.getElementById("game-title").style.color = "#ff00ff";
        
        updateUI();
        showQuestion();
    }

    function endBonusRound() {
        inBonusRound = false;
        document.getElementById("game-title").innerText = "★ MEK-MAN ★";
        document.getElementById("game-title").style.color = "#fff";
        document.getElementById("timer-display").style.display = "none";

        if(bonusCorrectCount === 5) {
            lives++;
            alert("5 RÄTT I BONUSRUNDAN! EXTRA LIV TILLDELAT! ❤");
        }

        currentLevel++;
        startLevel();
    }

    function showQuestion() {
        let qData = currentQuestions[questionIndex];
        
        document.getElementById("question-tracker").innerText = `Fråga ${questionIndex + 1} av ${currentQuestions.length}`;
        document.getElementById("question-text").innerText = qData.q;
        
        let options = [qData.r, ...qData.f].sort(() => 0.5 - Math.random());
        let btnHTML = "";
        
        options.forEach(opt => {
            let isCorrect = (opt === qData.r);
            btnHTML += `<button class="btn" onclick="checkAnswer(${isCorrect}, this)">${opt}</button>`;
        });
        
        document.getElementById("answer-buttons").innerHTML = btnHTML;

        // Starta timern om vi är i bonusrundan
        if(inBonusRound) {
            document.getElementById("timer-display").style.display = "block";
            startTimer();
        }
    }

    function startTimer() {
        clearInterval(bonusTimer);
        timeLeft = 15;
        document.getElementById("timer-display").innerText = "TID: " + timeLeft + "s";
        
        bonusTimer = setInterval(() => {
            timeLeft--;
            document.getElementById("timer-display").innerText = "TID: " + timeLeft + "s";
            if(timeLeft <= 0) {
                clearInterval(bonusTimer);
                timeOutAnswer();
            }
        }, 1000);
    }

    function timeOutAnswer() {
        const allBtns = document.querySelectorAll('#answer-buttons .btn');
        allBtns.forEach(b => b.disabled = true);
        document.body.classList.add("flash-red");
        setTimeout(() => document.body.classList.remove("flash-red"), 400);
        
        setTimeout(() => handleNextQuestion(), 1000);
    }

    function checkAnswer(isCorrect, clickedBtn) {
        clearInterval(bonusTimer); // Stoppa timern
        const allBtns = document.querySelectorAll('#answer-buttons .btn');
        allBtns.forEach(b => b.disabled = true);

        if (isCorrect) {
            if(inBonusRound) {
                score += 200; // Dubbla poäng
                bonusCorrectCount++;
            } else {
                score += 100; 
            }
            clickedBtn.style.backgroundColor = "#00ff00"; 
            clickedBtn.style.color = "#000";
        } else {
            clickedBtn.style.backgroundColor = "#ff0000"; 
            document.body.classList.add("flash-red");
            setTimeout(() => document.body.classList.remove("flash-red"), 400);
            
            // Förlora bara liv om det är en vanlig runda
            if(!inBonusRound) lives--; 
        }

        updateUI();

        setTimeout(() => {
            if (lives <= 0) return gameOver();
            handleNextQuestion();
        }, 1000); 
    }

    function handleNextQuestion() {
        questionIndex++;
        if (questionIndex >= currentQuestions.length) {
            if(!inBonusRound) {
                startBonusRound(); // Gå till bonusrunda efter vanlig nivå
            } else {
                endBonusRound(); // Gå till nästa nivå efter bonusrunda
            }
        } else {
            showQuestion(); 
        }
    }

    function updateUI() {
        document.getElementById("score-display").innerText = score.toString().padStart(4, '0');
        document.getElementById("lives-display").innerText = "❤".repeat(lives);
        document.getElementById("lvl-display").innerText = currentLevel;
    }

    function gameOver() {
        clearInterval(bonusTimer);
        document.getElementById("game-area").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        document.getElementById("final-score").innerText = score;
        saveScore(currentPlayerName, score);
    }
</script>
